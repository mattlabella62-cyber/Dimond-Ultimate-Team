<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiamondUT — Roster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root {
  --font-display: "Bebas Neue", "Arial Black", sans-serif;
  --font-body: "DM Sans", "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "Courier New", monospace;
  --gold: #F5C518; --gold2: #FFE066; --gold-glow: rgba(245,197,24,0.3);
  --red: #E8433B; --green: #27C96A; --blue: #3B8BF5;
  --bg: #060810; --surface: #0F1218; --surface2: #151B25;
  --border: #1E2535; --border2: #283044;
  --text: #E8ECF4; --muted: #5A6A82; --muted2: #3A4558;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); min-height: 100vh;
  padding: 40px 20px;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(180,120,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(80,200,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,80,200,0.06) 0%, transparent 50%);
}

.page-header { text-align: center; margin-bottom: 32px; }
.page-header-title {
  font-family: var(--font-display); font-size: 38px; letter-spacing: 5px;
  background: linear-gradient(135deg, #fff 0%, #a0e0ff 30%, #e0a0ff 60%, #ffd166 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; filter: drop-shadow(0 0 20px rgba(180,140,255,0.5));
}
.page-header-sub {
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  letter-spacing: 3px; margin-top: 6px;
}
.page-sport-badge {
  display: inline-block;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px;
  padding: 4px 14px; border-radius: 99px; margin-top: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
}

.hint-bar {
  text-align: center; padding: 10px 20px; margin-bottom: 24px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 10px; font-family: var(--font-mono); font-size: 11px;
  color: var(--muted); letter-spacing: 1px; max-width: 960px;
  margin-left: auto; margin-right: auto;
}
.hint-bar span { color: var(--gold); }

.section-label {
  font-family: var(--font-display); font-size: 16px; letter-spacing: 4px;
  color: var(--muted); border-bottom: 1px solid var(--border);
  padding-bottom: 8px; margin: 24px auto 16px;
  max-width: 960px;
}

.card-grid {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  max-width: 960px; margin: 0 auto 24px;
}

.card-scene {
  width: 145px; height: 210px;
  perspective: 600px; cursor: pointer; position: relative;
}
.card-scene.selected-from .player-card {
  box-shadow: 0 0 0 3px var(--gold), 0 0 20px var(--gold-glow) !important;
}

.player-card {
  width: 100%; height: 100%;
  position: absolute; inset: 0; border-radius: 14px; overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.card-scene:hover .player-card { transform: translateY(-4px) scale(1.02); }

.player-card.bronze   { background: linear-gradient(160deg,#5a1a00,#2e0e00); border: 1px solid rgba(210,100,50,0.65); box-shadow: 0 4px 20px rgba(210,100,50,0.2); }
.player-card.silver   { background: linear-gradient(160deg,#1a2a3e,#0d1824); border: 1px solid rgba(100,160,220,0.6);  box-shadow: 0 4px 20px rgba(80,140,210,0.2); }
.player-card.gold     { background: linear-gradient(160deg,#5a3800,#2e1c00); border: 1px solid rgba(240,180,0,0.7);    box-shadow: 0 4px 20px rgba(240,180,0,0.25); }
.player-card.platinum { background: linear-gradient(160deg,#2e0a7a,#160542); border: 1px solid rgba(155,80,255,0.7);  box-shadow: 0 4px 20px rgba(140,60,240,0.25); }
.player-card.legendary{ background: linear-gradient(160deg,#7a3500,#3d1a00); border: 1px solid rgba(255,180,0,0.85); animation: legendaryPulse 2s ease-in-out infinite; }
.player-card.common   { background: linear-gradient(160deg,#1a1a2e,#0d0d1a); border: 1px solid rgba(100,100,140,0.5); box-shadow: 0 4px 14px rgba(60,60,100,0.2); }
@keyframes legendaryPulse { 0%,100%{box-shadow:0 4px 30px rgba(255,140,0,0.4);} 50%{box-shadow:0 8px 60px rgba(255,140,0,0.8);} }

.card-rays { position:absolute;inset:0;z-index:0;background:repeating-conic-gradient(rgba(255,255,255,0.04) 0deg 10deg,transparent 10deg 20deg); }
.card-glow { position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:120px;height:50px;border-radius:50%;z-index:1;filter:blur(18px); }
.player-card.bronze .card-glow   { background:rgba(210,100,50,0.7); }
.player-card.silver .card-glow   { background:rgba(80,140,220,0.7); }
.player-card.gold .card-glow     { background:rgba(240,180,0,0.7); }
.player-card.platinum .card-glow { background:rgba(140,60,255,0.7); }
.player-card.legendary .card-glow{ background:rgba(255,140,0,0.9); }
.player-card.common .card-glow   { background:rgba(80,80,120,0.5); }
.card-shine { position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 50%,rgba(255,255,255,0.02) 100%);z-index:3; }

.card-tier { position:absolute;top:8px;left:8px;font-family:var(--font-display);font-size:9px;letter-spacing:1px;padding:3px 7px;border-radius:4px;z-index:10; }
.player-card.bronze .card-tier   { background:rgba(0,0,0,0.4);color:#f0a070;border:1px solid rgba(210,100,50,0.5); }
.player-card.silver .card-tier   { background:rgba(0,0,0,0.4);color:#c0d8f0;border:1px solid rgba(100,160,220,0.5); }
.player-card.gold .card-tier     { background:rgba(0,0,0,0.4);color:#ffe066;border:1px solid rgba(240,180,0,0.5); }
.player-card.platinum .card-tier { background:rgba(0,0,0,0.4);color:#c4b5fd;border:1px solid rgba(155,80,255,0.5); }
.player-card.legendary .card-tier{ background:rgba(0,0,0,0.4);color:#FFD166;border:1px solid rgba(255,180,0,0.7); }
.player-card.common .card-tier   { background:rgba(0,0,0,0.4);color:#a0a0c0;border:1px solid rgba(100,100,140,0.5); }

.card-coin { position:absolute;top:8px;right:8px;font-family:var(--font-mono);font-size:10px;font-weight:700;z-index:10; }
.player-card.bronze .card-coin { color:#f0a070; }
.player-card.silver .card-coin { color:#c0d8f0; }
.player-card.gold .card-coin   { color:#ffe066; }
.player-card.platinum .card-coin { color:#c4b5fd; }
.player-card.legendary .card-coin{ color:#FFD166; }
.player-card.common .card-coin  { color:#a0a0c0; }

.card-art-batter { position:absolute;top:35px;left:0;right:0;bottom:52px;display:flex;align-items:center;justify-content:center;overflow:hidden; }
.card-art-batter img { width:95%;height:auto;object-fit:contain;filter:drop-shadow(0 0 16px rgba(255,255,255,0.5));z-index:2; }
.card-art-pitcher { position:absolute;top:28px;left:0;right:0;height:118px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden; }
.card-art-pitcher img { height:110px;width:auto;position:absolute;bottom:0;left:50%;transform:translateX(-50%);filter:drop-shadow(0 0 16px rgba(255,255,255,0.5));z-index:2; }

.card-divider { position:absolute;top:146px;left:10px;right:10px;height:1px;z-index:4; }
.player-card.bronze .card-divider   { background:rgba(210,100,50,0.4); }
.player-card.silver .card-divider   { background:rgba(100,160,220,0.35); }
.player-card.gold .card-divider     { background:rgba(240,180,0,0.4); }
.player-card.platinum .card-divider { background:rgba(155,80,255,0.4); }
.player-card.legendary .card-divider{ background:rgba(255,180,0,0.6); }
.player-card.common .card-divider   { background:rgba(100,100,140,0.3); }

.card-info { position:absolute;bottom:0;left:0;right:0;padding:8px 10px 10px;background:rgba(0,0,0,0.6);z-index:5; }
.card-name { font-family:var(--font-display);font-size:14px;letter-spacing:1px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.player-card.bronze .card-name   { color:#f0a070; }
.player-card.silver .card-name   { color:#c0d8f0; }
.player-card.gold .card-name     { color:#ffe066; }
.player-card.platinum .card-name { color:#c4b5fd; }
.player-card.legendary .card-name{ color:#FFD166; text-shadow:0 0 10px rgba(255,180,0,0.6); }
.player-card.common .card-name   { color:#c0c0d8; }
.card-pos-team { font-family:var(--font-mono);font-size:9px;color:#5A6A82;margin-top:3px;display:flex;justify-content:space-between; }

.swap-btn {
  position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 6px; border: none;
  cursor: pointer; z-index: 20; transition: all 0.2s; letter-spacing: 1px;
}
.swap-btn.select-btn {
  background: rgba(245,197,24,0.15); border: 1px solid var(--gold); color: var(--gold);
}
.swap-btn.select-btn:hover { background: rgba(245,197,24,0.3); }
.swap-btn.swap-to-btn {
  background: rgba(39,201,106,0.15); border: 1px solid var(--green); color: var(--green);
}
.swap-btn.swap-to-btn:hover { background: rgba(39,201,106,0.3); }
.swap-btn.cancel-btn {
  background: rgba(232,67,59,0.15); border: 1px solid var(--red); color: var(--red);
}
.swap-btn.cancel-btn:hover { background: rgba(232,67,59,0.3); }

.dst-abbrev {
  font-family: var(--font-display); font-size: 32px; letter-spacing: 3px;
  color: white; text-shadow: 0 0 20px rgba(255,255,255,0.5);
  position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
  white-space: nowrap; z-index: 2;
}

.empty-slot {
  width: 145px; height: 210px; border-radius: 14px;
  border: 2px dashed var(--border2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--muted2);
}
.empty-slot-pos { font-family: var(--font-display); font-size: 18px; letter-spacing: 2px; }
.empty-slot-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-title">YOUR ROSTER</div>
  <div class="page-header-sub" id="rosterSub">LOADING...</div>
  <div class="page-sport-badge" id="rosterSportBadge">MLB</div>
</div>

<div class="hint-bar" id="hintBar">
  Tap <span>⇄</span> on any player to select them for a swap, then tap <span>↑</span> on another to complete the swap.
</div>

<div id="lineupSection">
  <div class="section-label">LINEUP</div>
  <div class="card-grid" id="lineupGrid"></div>
</div>

<div id="benchSection">
  <div class="section-label">BENCH</div>
  <div class="card-grid" id="benchGrid"></div>
</div>

x6urqEsYYmzZtWheAE5U2wIlFu9944417vGHLQ3bUqFHp/Dhj6f8DDDFPYOgRLy0AAAAASUVORK5CYII='

const PITCHER_POS = ['SP','RP','P']
const TIER_COIN   = {legendary:'👑', platinum:'100', gold:'60', silver:'25', bronze:'10', common:'5'}

let leagueId, teamId, sport
let allPlayers = []
let selectedId = null
let selectedSection = null

const MLB_ORDER = ['C','1B','2B','3B','SS','OF','OF','OF','DH','SP','SP','SP','RP','RP']
const NFL_ORDER = ['QB','RB','RB','WR','WR','WR','TE','K','DST','RB','WR','TE','QB','K']

function getImg(player) {
  if (sport === 'NFL') {
    const map = { QB: QB_IMG, RB: RB_IMG, WR: WR_IMG, TE: TE_IMG, K: K_IMG }
    return map[player.position] || WR_IMG
  }
  return PITCHER_POS.includes(player.position) ? PITCHER_IMG : BATTER_IMG
}

function buildCard(player, section) {
  const img = getImg(player)
  const isPitch = sport === 'MLB' && PITCHER_POS.includes(player.position)
  const artClass = isPitch ? 'card-art-pitcher' : 'card-art-batter'
  const tier = player.tier || 'common'
  const coin = TIER_COIN[tier] || ''

  const isFrom = selectedId === player.id && selectedSection === section
  const fromClass = isFrom ? ' selected-from' : ''

  let btnHtml = ''
  if (isFrom) {
    btnHtml = `<button class="swap-btn cancel-btn" onclick="cancelSwap()">&#x2715; cancel</button>`
  } else if (selectedId !== null) {
    btnHtml = `<button class="swap-btn swap-to-btn" onclick="doSwap('${player.id}','${section}')">&#x2191; swap</button>`
  } else {
    btnHtml = `<button class="swap-btn select-btn" onclick="selectPlayer('${player.id}','${section}')">&#x21c4;</button>`
  }

  const artContent = player.position === 'DST'
    ? `<div class="dst-abbrev">${player.team}</div>`
    : `<img src="${img}" alt="">`

  return `
  <div class="card-scene${fromClass}" id="scene-${player.id}">
    <div class="player-card ${tier}">
      <div class="card-rays"></div>
      <div class="card-glow"></div>
      <div class="card-shine"></div>
      <div class="card-tier">${tier.toUpperCase()}</div>
      <div class="card-coin">${coin}</div>
      <div class="${artClass}">${artContent}</div>
      <div class="card-divider"></div>
      <div class="card-info">
        <div class="card-name">${player.name}</div>
        <div class="card-pos-team"><span>${player.position}</span><span>${player.team}</span></div>
      </div>
    </div>
    ${btnHtml}
  </div>`
}

function buildEmptySlot(pos) {
  return `<div class="empty-slot"><div class="empty-slot-pos">${pos}</div><div class="empty-slot-label">EMPTY</div></div>`
}

function render() {
  const order = sport === 'NFL' ? NFL_ORDER : MLB_ORDER
  const lineup = allPlayers.filter(p => p.is_active)
  const bench  = allPlayers.filter(p => !p.is_active)

  let lineupHtml = ''
  order.forEach((pos, i) => {
    if (i < lineup.length) lineupHtml += buildCard(lineup[i], 'lineup')
    else lineupHtml += buildEmptySlot(pos)
  })
  document.getElementById('lineupGrid').innerHTML = lineupHtml

  let benchHtml = ''
  if (bench.length === 0) {
    benchHtml = '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:20px;">No bench players</div>'
  } else {
    bench.forEach(p => { benchHtml += buildCard(p, 'bench') })
  }
  document.getElementById('benchGrid').innerHTML = benchHtml
}

window.selectPlayer = (id, section) => {
  selectedId = id; selectedSection = section
  document.getElementById('hintBar').innerHTML =
    `Player selected — tap <span style="color:var(--green)">↑ swap</span> on another player, or <span style="color:var(--red)">✕ cancel</span> to deselect.`
  render()
}

window.cancelSwap = () => {
  selectedId = null; selectedSection = null
  document.getElementById('hintBar').innerHTML =
    `Tap <span style="color:var(--gold)">⇄</span> on any player to select them for a swap, then tap <span style="color:var(--green)">↑</span> on another to complete the swap.`
  render()
}

window.doSwap = (targetId, targetSection) => {
  const fi = allPlayers.findIndex(p => p.id === selectedId)
  const ti = allPlayers.findIndex(p => p.id === targetId)
  if (fi === -1 || ti === -1) { cancelSwap(); return }
  const fromActive = allPlayers[fi].is_active
  allPlayers[fi].is_active = allPlayers[ti].is_active
  allPlayers[ti].is_active = fromActive
  const temp = allPlayers[fi]; allPlayers[fi] = allPlayers[ti]; allPlayers[ti] = temp
  selectedId = null; selectedSection = null
  document.getElementById('hintBar').innerHTML =
    `Swap complete! Tap <span style="color:var(--gold)">⇄</span> to make another swap.`
  render()
  saveRoster()
}

async function saveRoster() {
  try {
    for (const p of allPlayers) {
      await supabase.from('rosters').update({ is_active: p.is_active })
        .eq('team_id', teamId).eq('player_id', p.id)
    }
  } catch(err) { console.error('Save error:', err) }
}

async function init() {
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  leagueId = localStorage.getItem('activeLeagueId')
  teamId   = localStorage.getItem('activeTeamId')
  sport    = localStorage.getItem('activeSport') || 'MLB'

  document.getElementById('rosterSportBadge').textContent = sport
  document.getElementById('rosterSub').textContent = `${sport} · SEASON 2026`

  if (!leagueId || !teamId) { window.location.href = 'create-league.html'; return }

  const { data: rosterRows } = await supabase
    .from('rosters').select('player_id, is_active, slot')
    .eq('team_id', teamId).eq('league_id', leagueId)

  if (!rosterRows || rosterRows.length === 0) {
    document.getElementById('lineupGrid').innerHTML =
      '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:20px;">No roster yet — open your starter pack first.</div>'
    return
  }

  const playerIds = rosterRows.map(r => r.player_id)
  const { data: players } = await supabase
    .from('players').select('id, name, position, team, tier, projected_points, sport')
    .in('id', playerIds)

  if (!players) return

  allPlayers = players.map(p => {
    const row = rosterRows.find(r => r.player_id === p.id)
    return { ...p, is_active: row ? row.is_active : false, slot: row?.slot || p.position }
  })

  const order = sport === 'NFL' ? NFL_ORDER : MLB_ORDER
  allPlayers.sort((a, b) => {
    if (a.is_active !== b.is_active) return a.is_active ? -1 : 1
    return (order.indexOf(a.position) ?? 99) - (order.indexOf(b.position) ?? 99)
  })

  render()
}

init()
</script>
</body>
