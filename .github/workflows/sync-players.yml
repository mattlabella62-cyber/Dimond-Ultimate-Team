name: DiamondUT Player Sync
 
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
 
jobs:
  sync-players:
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Remove node_modules if exists
        run: rm -rf node_modules
 
      - name: Run player sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-players-action.js
