<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiamondUT — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root {
  --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
  --font-body: 'DM Sans', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --gold: #F5C518; --gold2: #FFE066; --gold-glow: rgba(245,197,24,0.3);
  --red: #E8433B; --green: #27C96A; --blue: #3B8BF5;
  --bg: #060810; --surface: #0F1218; --surface2: #151B25;
  --border: #1E2535; --border2: #283044;
  --text: #E8ECF4; --muted: #5A6A82; --muted2: #3A4558;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(245,197,24,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(59,139,245,0.06) 0%, transparent 50%);
}

/* ═══ CARD ═══ */
.auth-card {
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

/* ═══ HEADER ═══ */
.auth-header {
  padding: 36px 36px 24px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(160deg, rgba(245,197,24,0.06), transparent);
  position: relative;
}
.auth-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-conic-gradient(rgba(255,255,255,0.02) 0deg 10deg, transparent 10deg 20deg);
}
.logo-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 8px; position: relative; z-index: 1;
}
.logo-diamond {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--gold), #FF8C00);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(245,197,24,0.4);
}
.logo-name {
  font-family: var(--font-display);
  font-size: 32px; letter-spacing: 4px; color: var(--gold);
}
.auth-tagline {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  position: relative; z-index: 1;
}

/* ═══ TABS ═══ */
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.auth-tab {
  flex: 1; padding: 14px;
  font-family: var(--font-display);
  font-size: 15px; letter-spacing: 2px;
  color: var(--muted); background: none;
  border: none; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.auth-tab.active {
  color: var(--gold);
  border-bottom: 2px solid var(--gold);
  background: rgba(245,197,24,0.04);
}
.auth-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

/* ═══ FORM ═══ */
.auth-body { padding: 28px 36px 36px; }

.form-panel { display: none; }
.form-panel.active { display: block; }

.form-group { margin-bottom: 18px; }
.form-label {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  display: block; margin-bottom: 7px;
}
.form-input {
  width: 100%; padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-family: var(--font-body); font-size: 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}
.form-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,197,24,0.1);
}
.form-input::placeholder { color: var(--muted2); }

.form-hint {
  font-size: 11px; color: var(--muted);
  margin-top: 5px; line-height: 1.5;
}

/* ═══ SUBMIT BTN ═══ */
.auth-btn {
  width: 100%; padding: 13px;
  background: var(--gold); color: var(--bg);
  border: none; border-radius: 8px;
  font-family: var(--font-display);
  font-size: 18px; letter-spacing: 3px;
  cursor: pointer; transition: all 0.15s;
  margin-top: 8px;
}
.auth-btn:hover {
  background: var(--gold2);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--gold-glow);
}
.auth-btn:active { transform: scale(0.98); }
.auth-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
  transform: none; box-shadow: none;
}

/* ═══ DIVIDER ═══ */
.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--muted2);
  font-family: var(--font-mono); font-size: 10px;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}

/* ═══ GOOGLE BTN ═══ */
.google-btn {
  width: 100%; padding: 11px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.google-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.04); }

/* ═══ ALERT ═══ */
.alert {
  padding: 11px 14px; border-radius: 8px;
  font-size: 13px; margin-bottom: 18px;
  display: none; line-height: 1.5;
}
.alert.error   { background: rgba(232,67,59,0.1);  border: 1px solid rgba(232,67,59,0.3);  color: #ff8a84; display: block; }
.alert.success { background: rgba(39,201,106,0.1); border: 1px solid rgba(39,201,106,0.3); color: #27C96A; display: block; }

/* ═══ LOADING SPINNER ═══ */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: var(--bg);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block; vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══ FOOTER ═══ */
.auth-footer {
  padding: 16px 36px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px; color: var(--muted2);
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="auth-card">

  <!-- HEADER -->
  <div class="auth-header">
    <div class="logo-wrap">
      <div class="logo-diamond">⬦</div>
      <div class="logo-name">DiamondUT</div>
    </div>
    <div class="auth-tagline">MLB · NFL · Season 2026</div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
    <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- FORMS -->
  <div class="auth-body">

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="loginPanel">
      <div class="alert" id="loginAlert"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" />
      </div>

      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Login</button>

      <div class="or-divider">or</div>

      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="signupPanel">
      <div class="alert" id="signupAlert"></div>

      <div class="form-group">
        <label class="form-label">Team Name</label>
        <input class="form-input" type="text" id="signupTeamName" placeholder="e.g. Thunder Bats" />
        <div class="form-hint">This is how you'll appear in the league</div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signupPassword" placeholder="Min 6 characters" />
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" id="signupConfirm" placeholder="••••••••" />
      </div>

      <button class="auth-btn" id="signupBtn" onclick="handleSignup()">Create Account</button>

      <div class="or-divider">or</div>

      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
    </div>

  </div>

  <div class="auth-footer">MLB · SEASON 2026 · DIAMONDUT</div>
</div>

<script type="module">
import { supabase } from './supabase.js'

// ═══ TAB SWITCHING ═══
window.switchTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'login'))
  })
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login')
  document.getElementById('signupPanel').classList.toggle('active', tab === 'signup')
}

// ═══ SHOW ALERT ═══
function showAlert(id, message, type) {
  const el = document.getElementById(id)
  el.textContent = message
  el.className = `alert ${type}`
}

// ═══ SET LOADING ═══
function setLoading(btnId, loading, defaultText) {
  const btn = document.getElementById(btnId)
  btn.disabled = loading
  btn.innerHTML = loading
    ? `<span class="spinner"></span> Please wait...`
    : defaultText
}

// ═══ LOGIN ═══
window.handleLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value

  if (!email || !password) {
    showAlert('loginAlert', 'Please fill in all fields.', 'error')
    return
  }

  setLoading('loginBtn', true, 'Login')

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password })
    if (error) throw error
    // Redirect to dashboard on success
    window.location.href = 'dashboard.html'
  } catch (err) {
    showAlert('loginAlert', err.message, 'error')
    setLoading('loginBtn', false, 'Login')
  }
}

// ═══ SIGNUP ═══
window.handleSignup = async () => {
  const teamName = document.getElementById('signupTeamName').value.trim()
  const email    = document.getElementById('signupEmail').value.trim()
  const password = document.getElementById('signupPassword').value
  const confirm  = document.getElementById('signupConfirm').value

  if (!teamName || !email || !password || !confirm) {
    showAlert('signupAlert', 'Please fill in all fields.', 'error')
    return
  }
  if (password !== confirm) {
    showAlert('signupAlert', 'Passwords do not match.', 'error')
    return
  }
  if (password.length < 6) {
    showAlert('signupAlert', 'Password must be at least 6 characters.', 'error')
    return
  }

  setLoading('signupBtn', true, 'Create Account')

  try {
    // Create auth user
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { team_name: teamName } }
    })
    if (error) throw error

    showAlert('signupAlert', '✅ Account created! Check your email to confirm, then log in.', 'success')
    setLoading('signupBtn', false, 'Create Account')

    // Switch to login tab after 2 seconds
    setTimeout(() => window.switchTab('login'), 2000)

  } catch (err) {
    showAlert('signupAlert', err.message, 'error')
    setLoading('signupBtn', false, 'Create Account')
  }
}

// ═══ GOOGLE ═══
window.handleGoogle = async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  })
  if (error) alert(error.message)
}

// ═══ AUTO REDIRECT IF ALREADY LOGGED IN ═══
const { data: { user } } = await supabase.auth.getUser()
if (user) window.location.href = 'dashboard.html'

// ═══ ENTER KEY SUPPORT ═══
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const loginActive = document.getElementById('loginPanel').classList.contains('active')
    if (loginActive) window.handleLogin()
    else window.handleSignup()
  }
})
</script>
</body>
</html>
